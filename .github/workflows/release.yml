name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libxdo-dev build-essential libssl-dev xsel
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"
      - name: Install deps
        run: bun install
      - name: Compile sidecar
        working-directory: packages/sidecar
        run: bun build ./src/main.ts --compile --target=bun-linux-x64 --outfile ../../apps/desktop/src-tauri/resources/passio-sidecar
      - name: Copy sqlite-vec
        run: |
          find node_modules/.bun -name "vec0.so" -path "*sqlite-vec-linux-x64*" | head -1 | \
            xargs -I {} cp {} apps/desktop/src-tauri/resources/vec0.so
      - name: Build bundles
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"
      - run: bun install
      - working-directory: packages/sidecar
        run: bun build ./src/main.ts --compile --target=bun-darwin-arm64 --outfile ../../apps/desktop/src-tauri/resources/passio-sidecar
      - working-directory: apps/desktop
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: cargo tauri build
      - uses: softprops/action-gh-release@v2
        with:
          files: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install tauri-cli --version "^2.0"
      - run: bun install
      - working-directory: packages/sidecar
        run: bun build ./src/main.ts --compile --target=bun-windows-x64 --outfile ../../apps/desktop/src-tauri/resources/passio-sidecar.exe
      - working-directory: apps/desktop
        run: cargo tauri build
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
