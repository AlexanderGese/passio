name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v2.3.0)"
        required: true

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libsoup-3.0-dev \
            build-essential \
            libssl-dev \
            patchelf

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Install deps (monorepo)
        run: bun install --frozen-lockfile

      - name: Compile Bun sidecar
        working-directory: packages/sidecar
        run: bun build ./src/main.ts --compile --target=bun-linux-x64 --outfile ../../apps/desktop/src-tauri/resources/passio-sidecar

      - name: Copy sqlite-vec native lib
        run: |
          set -euo pipefail
          SRC=$(find node_modules -name "vec0.so" -path "*sqlite-vec-linux-x64*" -print -quit)
          if [ -z "$SRC" ]; then
            echo "::error::vec0.so not found — sqlite-vec-linux-x64 may be missing. Run 'bun add sqlite-vec-linux-x64'."
            exit 1
          fi
          cp "$SRC" apps/desktop/src-tauri/resources/vec0.so
          ls -la apps/desktop/src-tauri/resources/

      - name: Build Tauri bundles
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build --bundles deb

      - name: Resolve release notes path
        id: notes
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          # v2.3.1 → look for releases/v2.3.md first (minor), then releases/v2.3.1.md (exact)
          MINOR=$(echo "$TAG" | sed -E 's/^(v[0-9]+\.[0-9]+).*/\1/')
          if [ -f ".github/releases/$TAG.md" ]; then
            echo "path=.github/releases/$TAG.md" >> "$GITHUB_OUTPUT"
          elif [ -f ".github/releases/$MINOR.md" ]; then
            echo "path=.github/releases/$MINOR.md" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Passio ${{ github.event.inputs.tag || github.ref_name }}
          body_path: ${{ steps.notes.outputs.path }}
          body: ${{ steps.notes.outputs.path == '' && 'Automated build. See README for install instructions.' || '' }}
          draft: false
          prerelease: ${{ contains(github.event.inputs.tag || github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb

  # macOS + Windows builds are scaffolded but disabled until signing is set up.
  # Flip `if:` to `true` (and add the secrets) when ready.
  build-macos:
    if: false
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install tauri-cli --version "^2.0" --locked
      - run: bun install --frozen-lockfile
      - working-directory: packages/sidecar
        run: bun build ./src/main.ts --compile --target=bun-darwin-arm64 --outfile ../../apps/desktop/src-tauri/resources/passio-sidecar
      - working-directory: apps/desktop
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: cargo tauri build
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg

  build-windows:
    if: false
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install tauri-cli --version "^2.0" --locked
      - run: bun install --frozen-lockfile
      - working-directory: packages/sidecar
        # Windows tauri.conf.json references resources/passio-sidecar — cargo's
        # bundler adds .exe automatically on Windows, so the source must match.
        run: bun build ./src/main.ts --compile --target=bun-windows-x64 --outfile ../../apps/desktop/src-tauri/resources/passio-sidecar.exe
      - working-directory: apps/desktop
        run: cargo tauri build
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
