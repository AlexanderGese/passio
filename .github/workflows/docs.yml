name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
      - "docs/**"
      - "orchard/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/configure-pages@v5

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build static site
        working-directory: apps/docs
        env:
          # Served at https://<user>.github.io/passio/ — Next.js prepends
          # this to every asset + internal link.
          BASE_PATH: /passio
        run: bun run build

      - name: Add .nojekyll
        run: touch apps/docs/out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
