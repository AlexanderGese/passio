<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Passio</title>
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 14px 16px;
        background: #1a1422;
        color: #fff4e0;
        font: 13px/1.4 "JetBrains Mono", system-ui, sans-serif;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px;
        color: #ffb84d;
        font-weight: 600;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 6px 0;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #444;
      }
      .dot.ok { background: #34d399; }
      .dot.warn { background: #fbbf24; }
      button {
        background: #ffb84d;
        color: #1a1422;
        border: 0;
        padding: 6px 10px;
        font: inherit;
        border-radius: 6px;
        cursor: pointer;
      }
      a {
        color: #8b3fa0;
      }
      .hint {
        font-size: 11px;
        color: #888;
      }
    </style>
  </head>
  <body>
    <h1>🍇 Passio</h1>
    <div class="row">
      <span class="dot" id="dot"></span>
      <span id="status">checking…</span>
    </div>
    <div id="paired-extra" style="display:none">
      <p class="hint" id="paired-port"></p>
    </div>
    <div id="unpaired-extra" style="display:none">
      <p class="hint">Open the options page to paste the pairing token from Passio.</p>
      <button id="open-options">Open options</button>
    </div>
    <script src="popup.js" type="module"></script>
  </body>
</html>
