<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#2a1a40"/>
      <stop offset="100%" stop-color="#120E1A"/>
    </radialGradient>
    <linearGradient id="leafA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a4f48a"/>
      <stop offset="55%" stop-color="#6fd26b"/>
      <stop offset="100%" stop-color="#3a9b4f"/>
    </linearGradient>
    <linearGradient id="leafB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#bff9a1"/>
      <stop offset="60%" stop-color="#79d87a"/>
      <stop offset="100%" stop-color="#3a9b4f"/>
    </linearGradient>
    <linearGradient id="stem" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5fb85a"/>
      <stop offset="100%" stop-color="#2d7a3b"/>
    </linearGradient>
    <linearGradient id="seedShell" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffb84d"/>
      <stop offset="60%" stop-color="#d07a2a"/>
      <stop offset="100%" stop-color="#6d3b16"/>
    </linearGradient>
    <linearGradient id="seedHalo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,184,77,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,184,77,0)"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background (macOS/Win-friendly) -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Soft pulp glow -->
  <ellipse cx="256" cy="330" rx="170" ry="60" fill="rgba(168,85,247,0.18)"/>

  <!-- Seed shell (passionfruit seed, cracked open) -->
  <g transform="translate(256 360)">
    <ellipse cx="0" cy="0" rx="130" ry="38" fill="url(#seedHalo)"/>
    <path d="M -95 -8
             C -95 -55, -60 -80, 0 -80
             C 60 -80, 95 -55, 95 -8
             C 95 30, 55 46, 0 46
             C -55 46, -95 30, -95 -8 Z"
          fill="url(#seedShell)"/>
    <!-- Crack line where sprout emerges -->
    <path d="M -40 -70 C -20 -55, 20 -55, 40 -70"
          fill="none" stroke="#3a1f0a" stroke-width="6" stroke-linecap="round"/>
    <!-- Highlight -->
    <path d="M -70 -30 C -55 -55, -20 -68, 10 -68"
          fill="none" stroke="rgba(255,240,180,0.55)" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Stem -->
  <path d="M 256 290 C 250 220, 256 165, 256 100"
        stroke="url(#stem)" stroke-width="18" stroke-linecap="round" fill="none"/>

  <!-- Left leaf -->
  <path d="M 256 210
           C 170 200, 120 155, 130 100
           C 195 110, 250 145, 256 205 Z"
        fill="url(#leafA)"/>
  <path d="M 256 210 C 210 195, 170 165, 150 125"
        stroke="#2d7a3b" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6"/>

  <!-- Right leaf (bigger, foreground) -->
  <path d="M 256 180
           C 340 165, 395 115, 390 60
           C 320 70, 265 110, 256 178 Z"
        fill="url(#leafB)"/>
  <path d="M 256 180 C 305 160, 350 125, 375 85"
        stroke="#2d7a3b" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.55"/>

  <!-- Tip dew-drop -->
  <circle cx="256" cy="98" r="6" fill="#bff9a1" opacity="0.95"/>
  <circle cx="258" cy="96" r="2" fill="#ffffff" opacity="0.9"/>
</svg>
