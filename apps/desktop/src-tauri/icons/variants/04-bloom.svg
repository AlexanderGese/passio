<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#2a1a40"/>
      <stop offset="100%" stop-color="#120E1A"/>
    </radialGradient>
    <linearGradient id="petal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5e4ff"/>
      <stop offset="100%" stop-color="#b180e6"/>
    </linearGradient>
    <radialGradient id="corona" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="60%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <radialGradient id="center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe27a"/>
      <stop offset="100%" stop-color="#d07a2a"/>
    </radialGradient>
  </defs>
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)"/>
  <!-- 5 outer petals -->
  <g transform="translate(256 256)">
    <g>
      <ellipse cx="0" cy="-140" rx="40" ry="90" fill="url(#petal)"/>
    </g>
    <g transform="rotate(72)">
      <ellipse cx="0" cy="-140" rx="40" ry="90" fill="url(#petal)"/>
    </g>
    <g transform="rotate(144)">
      <ellipse cx="0" cy="-140" rx="40" ry="90" fill="url(#petal)"/>
    </g>
    <g transform="rotate(216)">
      <ellipse cx="0" cy="-140" rx="40" ry="90" fill="url(#petal)"/>
    </g>
    <g transform="rotate(288)">
      <ellipse cx="0" cy="-140" rx="40" ry="90" fill="url(#petal)"/>
    </g>
  </g>
  <!-- Purple corona rings (passionflower signature) -->
  <g transform="translate(256 256)">
    <circle r="80" fill="url(#corona)"/>
    <g stroke="#f5e4ff" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.85">
      <line x1="0" y1="-76" x2="0" y2="-40"/>
      <line x1="22" y1="-72" x2="12" y2="-38" transform="rotate(18 0 0)"/>
      <line x1="22" y1="-72" x2="12" y2="-38" transform="rotate(36 0 0)"/>
      <line x1="22" y1="-72" x2="12" y2="-38" transform="rotate(54 0 0)"/>
      <line x1="22" y1="-72" x2="12" y2="-38" transform="rotate(72 0 0)"/>
      <line x1="22" y1="-72" x2="12" y2="-38" transform="rotate(90 0 0)"/>
      <line x1="22" y1="-72" x2="12" y2="-38" transform="rotate(108 0 0)"/>
      <line x1="22" y1="-72" x2="12" y2="-38" transform="rotate(126 0 0)"/>
      <line x1="22" y1="-72" x2="12" y2="-38" transform="rotate(144 0 0)"/>
      <line x1="22" y1="-72" x2="12" y2="-38" transform="rotate(162 0 0)"/>
      <line x1="22" y1="-72" x2="12" y2="-38" transform="rotate(180 0 0)"/>
      <line x1="22" y1="-72" x2="12" y2="-38" transform="rotate(198 0 0)"/>
      <line x1="22" y1="-72" x2="12" y2="-38" transform="rotate(216 0 0)"/>
      <line x1="22" y1="-72" x2="12" y2="-38" transform="rotate(234 0 0)"/>
      <line x1="22" y1="-72" x2="12" y2="-38" transform="rotate(252 0 0)"/>
      <line x1="22" y1="-72" x2="12" y2="-38" transform="rotate(270 0 0)"/>
      <line x1="22" y1="-72" x2="12" y2="-38" transform="rotate(288 0 0)"/>
      <line x1="22" y1="-72" x2="12" y2="-38" transform="rotate(306 0 0)"/>
      <line x1="22" y1="-72" x2="12" y2="-38" transform="rotate(324 0 0)"/>
      <line x1="22" y1="-72" x2="12" y2="-38" transform="rotate(342 0 0)"/>
    </g>
    <circle r="28" fill="url(#center)"/>
    <circle r="10" fill="#3a2405"/>
  </g>
</svg>
